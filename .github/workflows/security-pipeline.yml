name: DevSecOps Security Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:

  # ======================
  # 1. BUILD
  # ======================
  build:
    name: Build .NET App
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --configuration Release

  # ======================
  # 2. SAST
  # ======================
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten

      - name: Upload SAST results
        uses: actions/upload-artifact@v4
        with:
          name: sast-results
          path: .

  # ======================
  # 3. SCA
  # ======================
  sca:
    name: SCA (OWASP Dependency Check)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'BackendTutorialEmpty'
          path: '.'
          format: 'HTML'
          out: 'reports'

      - name: Upload SCA reports
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: reports

  # ======================
  # 4. DAST
  # ======================
  dast:
  name: DAST (OWASP ZAP)
  runs-on: ubuntu-latest
  needs: build

  steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0'

    - name: Restore & Build
      run: |
        dotnet restore
        dotnet build --configuration Release

    - name: Start application
      run: |
        dotnet run --urls http://0.0.0.0:5068 &

    - name: Wait for app to be ready
      run: |
        echo "Waiting for app..."
        for i in {1..20}; do
          if curl -s http://localhost:5068/swagger/index.html > /dev/null; then
            echo "✅ App is ready"
            break
          fi
          echo "⏳ Still waiting..."
          sleep 5
        done

    - name: Debug - check if app is running
      run: |
        echo "Testing application endpoint..."
        curl -v http://localhost:5068/swagger/index.html || true

    - name: Run OWASP ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.11.0
      with:
        target: 'http://host.docker.internal:5068/swagger/index.html'
        fail_action: false

    - name: Debug - check if report exists
      run: |
        echo "Listing files..."
        ls -la
        if [ -f report_html.html ]; then
          echo "✅ ZAP report generated"
        else
          echo "❌ ZAP report NOT found"
        fi

    - name: Upload DAST report
      uses: actions/upload-artifact@v4
      with:
        name: dast-report
        path: report_html.html
  # ======================
  # 5. SECURITY GATE
  # ======================
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [sast, sca, dast]

    steps:
      - name: Download SCA reports
        uses: actions/download-artifact@v4
        with:
          name: sca-reports
          path: reports

      - name: Evaluate security results
        run: |
          echo "Checking security reports..."

          if grep -R "HIGH" reports || grep -R "CRITICAL" reports; then
            echo "❌ Security Gate FAILED"
            exit 1
          fi

          echo "✅ Security Gate PASSED"