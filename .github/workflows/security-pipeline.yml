name: DevSecOps Security Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:

  # ======================
  # 1. BUILD
  # ======================
  build:
    name: Build .NET App
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --configuration Release

  # ======================
  # 2. SAST
  # ======================
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten

      - name: Upload SAST results
        uses: actions/upload-artifact@v4
        with:
          name: sast-results
          path: .

  # ======================
  # 3. SCA
  # ======================
  sca:
    name: SCA (OWASP Dependency Check)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'BackendTutorialEmpty'
          path: '.'
          format: 'HTML'
          out: 'reports'

      - name: Upload SCA reports
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: reports

  # ======================
  # 4. DAST
  # ======================
  dast:
      name: DAST (OWASP ZAP)
      runs-on: ubuntu-latest
      needs: build

       # Add MySQL database service
      services:
        mysql:
            image: mysql:8.0
            env:
              MYSQL_ROOT_PASSWORD: sqlShaza_94
              MYSQL_DATABASE: GitFile
            ports:
              - 3306:3306
            options: >-
              --health-cmd="mysqladmin ping"
              --health-interval=10s
              --health-timeout=5s
              --health-retries=5


      steps:
        - uses: actions/checkout@v4

        - name: Setup .NET
          uses: actions/setup-dotnet@v4
          with:
            dotnet-version: '8.0'

        - name: Restore & Build
          run: |
            dotnet restore
            dotnet build --configuration Release

        - name: Start application (background + logs)
          run: |
            nohup dotnet run --urls http://0.0.0.0:5068 > app.log 2>&1 &

        - name: Wait for app to be ready
          run: |
            echo "Waiting for app..."
            for i in {1..30}; do
              if curl -s http://localhost:5068/swagger/index.html > /dev/null; then
                echo "✅ App is ready"
                exit 0
              fi
              echo "⏳ Still waiting..."
              sleep 5
            done

            echo "❌ App failed to start"
            cat app.log
            exit 1

        - name: Prepare ZAP workspace
          run: |
            mkdir -p zap-work
            chmod -R 777 zap-work

        - name: Run OWASP ZAP Baseline Scan
          uses: zaproxy/action-baseline@v0.11.0
          with:
            # IMPORTANT: ZAP runs in Docker → must NOT use localhost
            target: 'http://host.docker.internal:5068/swagger/index.html'
            fail_action: false
            cmd_options: '-w zap-work'

        - name: Debug - check report
          run: |
            echo "Listing files..."
            ls -la
            if [ -f report_html.html ]; then
              echo "✅ Report exists"
            else
              echo "❌ Missing report"
            fi

        - name: Upload DAST report
          uses: actions/upload-artifact@v4
          with:
            name: dast-report
            path: report_html.html  
  # ======================
  # 5. SECURITY GATE
  # ======================
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [sast, sca, dast]

    steps:
      - name: Download SCA reports
        uses: actions/download-artifact@v4
        with:
          name: sca-reports
          path: reports

      - name: Evaluate security results
        run: |
          echo "Checking security reports..."

          if grep -R "HIGH" reports || grep -R "CRITICAL" reports; then
            echo "❌ Security Gate FAILED"
            exit 1
          fi

          echo "✅ Security Gate PASSED"