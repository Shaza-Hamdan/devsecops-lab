name: DevSecOps Security Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:

  # ======================
  # 1. BUILD
  # ======================
  build:
    name: Build .NET App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --configuration Release

  # ======================
  # 2. SAST
  # ======================
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten

      - name: Upload SAST results
        uses: actions/upload-artifact@v4
        with:
          name: sast-results
          path: .

  # ======================
  # 3. SCA
  # ======================
  sca:
    name: SCA (OWASP Dependency Check)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'BackendTutorialEmpty'
          path: '.'
          format: 'HTML'
          out: 'reports'

      - name: Upload SCA reports
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: reports

  # ======================
  # 4. DAST
  # ======================
  dast:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Restore & Build
        run: |
          dotnet restore
          dotnet build --configuration Release

      - name: Start application
        run: |
          dotnet run --urls http://localhost:5068 &
          sleep 25

      - name: Run OWASP ZAP Baseline Scan
       uses: zaproxy/action-baseline@v0.11.0
       with:
         target: 'http://localhost:5068'
         fail_action: false
         cmd_options: '-r zap-report.html'

      - name: Upload DAST report
       uses: actions/upload-artifact@v4
       with:
         name: dast-report
         path: zap-report.html

  # ======================
  # 5. SECURITY GATE
  # ======================
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [sast, sca, dast]

    steps:
      - name: Download SCA reports
        uses: actions/download-artifact@v4
        with:
          name: sca-reports
          path: reports

      - name: Evaluate security results
        run: |
          echo "Checking security reports..."

          if grep -R "HIGH" reports || grep -R "CRITICAL" reports; then
            echo "❌ Security Gate FAILED"
            exit 1
          fi

          echo "✅ Security Gate PASSED"